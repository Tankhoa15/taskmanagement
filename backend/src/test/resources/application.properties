quarkus.kafka.devservices.enabled=false
quarkus.rabbitmq.devservices.enabled=false
quarkus.scheduler.enabled=false

# Use in-memory messaging channels for tests
mp.messaging.outgoing.task-events-kafka.connector=smallrye-in-memory
mp.messaging.incoming.task-events-kafka-consumer.connector=smallrye-in-memory
mp.messaging.outgoing.task-events-out.connector=smallrye-in-memory
mp.messaging.incoming.task-created-email.connector=smallrye-in-memory
mp.messaging.incoming.task-deadline-warning.connector=smallrye-in-memory
mp.messaging.incoming.task-done-notification.connector=smallrye-in-memory
