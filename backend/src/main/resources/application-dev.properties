# Application Configuration
quarkus.application.name=task-management

# HTTP Configuration
quarkus.http.port=8080
quarkus.http.host=0.0.0.0

# Development Profile Database
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=taskuser
quarkus.datasource.password=taskpass123
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/taskmanagement

# Hibernate ORM
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=true

# Flyway
quarkus.flyway.migrate-at-start=true

# JWT Configuration for Development
mp.jwt.verify.publickey.location=publicKey.pem
mp.jwt.verify.issuer=task-management
smallrye.jwt.sign.key.location=privateKey.pem

# Google OAuth2 (Development - Replace with actual credentials)
quarkus.oidc.client-id=your-client-id.apps.googleusercontent.com
quarkus.oidc.credentials.secret=your-client-secret

# Mail Configuration (Development)
quarkus.mail.host=localhost
quarkus.mail.port=1025

# RabbitMQ (Development)
mp.messaging.outgoing.task-events-out.connector=smallrye-rabbitmq
mp.messaging.outgoing.task-events-out.host=localhost
mp.messaging.outgoing.task-events-out.port=5672

# Logging
quarkus.log.level=INFO
quarkus.log.category."com.taskmanagement".level=DEBUG

# Swagger UI
quarkus.swaggerui.always-include=true
