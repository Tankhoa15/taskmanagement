# Application Configuration
quarkus.application.name=task-management

# HTTP Configuration
quarkus.http.port=8080

# Production Profile Database
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USERNAME}
quarkus.datasource.password=${DB_PASSWORD}
quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}

# Hibernate ORM
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=false

# Flyway
quarkus.flyway.migrate-at-start=true

# JWT Configuration for Production
mp.jwt.verify.publickey.location=publicKey.pem
mp.jwt.verify.issuer=task-management
smallrye.jwt.sign.key.location=privateKey.pem

# Google OAuth2 (Production - Use environment variables)
quarkus.oidc.client-id=${GOOGLE_CLIENT_ID}
quarkus.oidc.credentials.secret=${GOOGLE_CLIENT_SECRET}

# Mail Configuration (Production)
quarkus.mail.host=${MAIL_HOST}
quarkus.mail.port=${MAIL_PORT}
quarkus.mail.username=${MAIL_USERNAME}
quarkus.mail.password=${MAIL_PASSWORD}
quarkus.mail.from=${MAIL_FROM}

# RabbitMQ (Production)
mp.messaging.outgoing.task-events-out.connector=smallrye-rabbitmq
mp.messaging.outgoing.task-events-out.host=${RABBITMQ_HOST}
mp.messaging.outgoing.task-events-out.port=${RABBITMQ_PORT}
mp.messaging.outgoing.task-events-out.username=${RABBITMQ_USERNAME}
mp.messaging.outgoing.task-events-out.password=${RABBITMQ_PASSWORD}

# Logging
quarkus.log.level=INFO
quarkus.log.category."com.taskmanagement".level=INFO

# Health Check
quarkus.smallrye-health.root-path=/health
