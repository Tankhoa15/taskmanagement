# Application Configuration
quarkus.application.name=task-management

# HTTP Configuration
quarkus.http.port=${PORT:8080}
quarkus.http.host=0.0.0.0
quarkus.http.cors=true
quarkus.http.cors.origins=${CORS_ORIGINS:*}
quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with

# Database Configuration
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USERNAME:taskuser}
quarkus.datasource.password=${DB_PASSWORD:taskpass123}
quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:taskmanagement}

# Hibernate ORM
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=false

# Flyway
quarkus.flyway.migrate-at-start=true

# JWT
mp.jwt.verify.publickey.location=publicKey.pem
mp.jwt.verify.issuer=task-management
smallrye.jwt.sign.key.location=privateKey.pem

# Mail defaults. EMAIL_ENABLED=false prevents demo deployments from sending mail.
quarkus.mail.host=${MAIL_HOST:smtp.gmail.com}
quarkus.mail.port=${MAIL_PORT:587}
quarkus.mail.username=${MAIL_USERNAME:noreply@taskmanagement.com}
quarkus.mail.password=${MAIL_PASSWORD:mailpassword}
quarkus.mail.from=${MAIL_FROM:noreply@taskmanagement.com}
task-management.email.enabled=${EMAIL_ENABLED:false}

# Messaging defaults to in-memory for low-cost demo deployments.
mp.messaging.outgoing.task-events-out.connector=${TASK_EVENTS_OUT_CONNECTOR:smallrye-in-memory}
mp.messaging.outgoing.task-events-out.host=${RABBITMQ_HOST:localhost}
mp.messaging.outgoing.task-events-out.port=${RABBITMQ_PORT:5672}
mp.messaging.outgoing.task-events-out.username=${RABBITMQ_USERNAME:guest}
mp.messaging.outgoing.task-events-out.password=${RABBITMQ_PASSWORD:guest}

mp.messaging.incoming.task-created-email.connector=${TASK_CREATED_EMAIL_CONNECTOR:smallrye-in-memory}
mp.messaging.incoming.task-deadline-warning.connector=${TASK_DEADLINE_WARNING_CONNECTOR:smallrye-in-memory}
mp.messaging.incoming.task-done-notification.connector=${TASK_DONE_NOTIFICATION_CONNECTOR:smallrye-in-memory}

mp.messaging.outgoing.task-events-kafka.connector=${TASK_EVENTS_KAFKA_CONNECTOR:smallrye-in-memory}
mp.messaging.incoming.task-events-kafka-consumer.connector=${TASK_EVENTS_KAFKA_CONSUMER_CONNECTOR:smallrye-in-memory}
mp.messaging.incoming.audit-events.connector=${AUDIT_EVENTS_CONNECTOR:smallrye-in-memory}

# Swagger / Health / Logging
quarkus.swaggerui.always-include=true
quarkus.smallrye-health.root-path=/health
quarkus.log.level=INFO
quarkus.log.category."com.taskmanagement".level=INFO
