services:
  - type: web
    name: taskmanagement-backend
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: QUARKUS_PROFILE
        value: prod
      - key: DATABASE_URL
        fromDatabase:
          name: taskmanagement-db
          property: connectionString
      - key: EMAIL_ENABLED
        sync: false
      - key: MAIL_HOST
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_FROM
        sync: false

databases:
  - name: taskmanagement-db
    plan: free
    databaseName: taskmanagement
    user: taskuser
