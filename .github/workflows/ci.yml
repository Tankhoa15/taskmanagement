name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '18'

jobs:
  # ===============================
  # Backend CI
  # ===============================
  backend-ci:
    name: Backend CI (Java 21)
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: taskmanagement_test
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Generate JWT Keys
        run: |
          mkdir -p backend/src/main/resources
          openssl genrsa -out backend/src/main/resources/privateKey.pem 2048
          openssl pkcs8 -topk8 -inform PEM -outform PEM -nocrypt -in backend/src/main/resources/privateKey.pem -out backend/src/main/resources/pkcs8.pem
          mv backend/src/main/resources/pkcs8.pem backend/src/main/resources/privateKey.pem
          openssl rsa -in backend/src/main/resources/privateKey.pem -pubout -out backend/src/main/resources/publicKey.pem

      - name: Build Backend
        run: cd backend && ./mvnw clean package -DskipTests

      - name: Run Tests
        run: cd backend && ./mvnw test
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: taskmanagement_test
          DB_USERNAME: testuser
          DB_PASSWORD: testpass

  # ===============================
  # Frontend Web CI
  # ===============================
  frontend-web-ci:
    name: Frontend Web CI
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend-web/package-lock.json

      - name: Install Dependencies
        run: cd frontend-web && npm ci

      - name: Run ESLint
        run: cd frontend-web && npm run lint || true

      - name: Type Check
        run: cd frontend-web && npx tsc --noEmit || true

      - name: Build
        run: cd frontend-web && npm run build || true

  # ===============================
  # Mobile App CI
  # ===============================
  mobile-ci:
    name: Mobile App CI
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend-app/package-lock.json

      - name: Install Dependencies
        run: cd frontend-app && npm ci

      - name: Type Check
        run: cd frontend-app && npx tsc --noEmit || true

  # ===============================
  # Docker Build (on main only)
  # ===============================
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-ci]
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate JWT Keys
        run: |
          mkdir -p backend/src/main/resources
          openssl genrsa -out backend/src/main/resources/privateKey.pem 2048
          openssl pkcs8 -topk8 -inform PEM -outform PEM -nocrypt -in backend/src/main/resources/privateKey.pem -out backend/src/main/resources/pkcs8.pem
          mv backend/src/main/resources/pkcs8.pem backend/src/main/resources/privateKey.pem
          openssl rsa -in backend/src/main/resources/privateKey.pem -pubout -out backend/src/main/resources/publicKey.pem

      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/task-management-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
