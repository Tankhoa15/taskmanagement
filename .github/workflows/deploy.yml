name: Deploy Production

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '18'

jobs:
  # ===============================
  # Build and Push Docker Image
  # ===============================
  build-backend:
    name: Build Backend Docker Image
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate JWT Keys
        run: |
          mkdir -p backend/src/main/resources
          openssl genrsa -out backend/src/main/resources/privateKey.pem 2048
          openssl pkcs8 -topk8 -inform PEM -outform PEM -nocrypt -in backend/src/main/resources/privateKey.pem -out backend/src/main/resources/pkcs8.pem
          mv backend/src/main/resources/pkcs8.pem backend/src/main/resources/privateKey.pem
          openssl rsa -in backend/src/main/resources/privateKey.pem -pubout -out backend/src/main/resources/publicKey.pem

      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/task-management-backend:${{ github.ref_name }}
            ${{ secrets.DOCKERHUB_USERNAME }}/task-management-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===============================
  # Deploy to Server (SSH)
  # ===============================
  deploy-backend:
    name: Deploy Backend to Server
    runs-on: ubuntu-latest
    needs: build-backend
    if: github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/task-management
            docker-compose pull backend
            docker-compose up -d backend
            docker image prune -f

  # ===============================
  # Deploy Frontend
  # ===============================
  deploy-frontend:
    name: Deploy Frontend Web
    runs-on: ubuntu-latest
    needs: build-backend
    if: github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend-web/package-lock.json

      - name: Install Dependencies
        run: cd frontend-web && npm ci

      - name: Build
        run: cd frontend-web && npm run build
        env:
          VITE_API_URL: ${{ secrets.FRONTEND_API_URL }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v1
        with:
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: ${{ secrets.FIREBASE_PROJECT_ID }}
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

  # ===============================
  # Health Check
  # ===============================
  health-check:
    name: Health Check After Deploy
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Check Backend Health
        run: |
          for i in {1..5}; do
            if curl -f http://${{ secrets.SERVER_HOST }}:8080/q/health 2>/dev/null; then
              echo "Backend is healthy!"
              exit 0
            fi
            echo "Waiting for backend... ($i/5)"
            sleep 10
          done
          echo "Backend health check failed"
          exit 1
