name: Deploy Production

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '20'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # ===============================
  # Deploy Frontend
  # ===============================
  deploy-frontend:
    name: Deploy Frontend Web
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend-web/package-lock.json

      - name: Install Dependencies
        run: cd frontend-web && npm ci

      - name: Build
        run: cd frontend-web && npm run build
        env:
          VITE_API_URL: ${{ secrets.FRONTEND_API_URL }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}

      - name: Configure Firebase project
        run: |
          node -e "const fs = require('fs'); const projectId = JSON.parse(process.env.FIREBASE_SERVICE_ACCOUNT_JSON).project_id; if (!projectId) { throw new Error('FIREBASE_SERVICE_ACCOUNT is missing project_id'); } fs.writeFileSync('.firebaserc', JSON.stringify({ projects: { default: projectId } }, null, 2) + '\n');"
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: ${{ fromJson(secrets.FIREBASE_SERVICE_ACCOUNT).project_id }}
