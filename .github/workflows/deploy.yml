name: Deploy Production

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      firebase_project_id:
        description: 'Firebase project id. Optional if FIREBASE_PROJECT_ID variable/secret is set.'
        required: false
        type: string

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '20'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # ===============================
  # Deploy Frontend
  # ===============================
  deploy-frontend:
    name: Deploy Frontend Web
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend-web/package-lock.json

      - name: Install Dependencies
        run: cd frontend-web && npm ci

      - name: Build
        run: cd frontend-web && npm run build
        env:
          VITE_API_URL: ${{ secrets.FRONTEND_API_URL }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}

      - name: Configure Firebase project
        id: firebase-project
        run: |
          node <<'NODE'
          const fs = require('fs');

          const serviceAccount = JSON.parse(process.env.FIREBASE_SERVICE_ACCOUNT_JSON || '{}');
          const projectId = serviceAccount.project_id || process.env.FIREBASE_PROJECT_ID;

          if (!projectId) {
            throw new Error('Set FIREBASE_PROJECT_ID or use a FIREBASE_SERVICE_ACCOUNT JSON secret with project_id');
          }

          fs.writeFileSync('.firebaserc', JSON.stringify({ projects: { default: projectId } }, null, 2) + '\n');
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `project_id=${projectId}\n`);
          NODE
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_PROJECT_ID: ${{ inputs.firebase_project_id || vars.FIREBASE_PROJECT_ID || secrets.FIREBASE_PROJECT_ID }}

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: ${{ steps.firebase-project.outputs.project_id }}
